<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resto Praia do Forte</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <img src="./LOGO EXEMPLO.png" width="200px" alt="logo resto">
    <!-- <div class="logo"><span>La</span> Mesa</div> -->
    <div class="tagline">Menu digital</div>
    <div class="header-line"></div>
  </header>

  <!-- ── CATEGORY NAV ── -->
  <nav id="nav"></nav>

  <!-- ── MAIN LAYOUT ── -->
  <div class="main-wrap">

    <!-- Menu items rendered by JS -->
    <div class="menu-section" id="menuSection"></div>

    <!-- ── AI CHAT SIDEBAR ── -->
    <aside class="chat-sidebar" id="chatSidebar">
      <div class="chat-header">
        <div class="ai-dot"></div>
        <div>
          <div class="chat-title">Asistente IA</div>
          <div class="chat-subtitle">Pergunta sobre o menu ou faz teu pedido</div>
        </div>
      </div>

      <div class="quick-chips" id="quickChips">
        <button class="chip" onclick="sendChip('O que você recomenda?')">O que você recomenda?</button>
        <button class="chip" onclick="sendChip('Tem opções vegetarianas?')">Opções vegetarianas</button>
        <!-- <button class="chip" onclick="sendChip('¿O mais pedido?')">O mais pedido</button> -->
        <button class="chip" onclick="sendChip('Quero fazer um pedido')">Fazer um pedido</button>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="msg bot">
          <div class="msg-label">Asistente</div>
          Olá! 👋 Sou assistente de <em>Restaurante Praia do Forte</em>. Posso lhe ajudar a conhecer nossos pratos, ingredientes, ou armar seu pedido. Como posso ajudar?
        </div>
      </div>

      <div class="chat-input-area">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="Escreve tua pergunta..."
          rows="1"
          onkeydown="handleKey(event)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </aside>

  </div>

  <!-- ── MOBILE CHAT TOGGLE ── -->
  <button class="mobile-chat-toggle" onclick="toggleMobileChat()" id="mobileToggle">💬</button>

  <!-- ── CART INDICATOR ── -->
  <div class="cart-indicator" id="cartIndicator" onclick="openModal()">
    Ver pedido · <span id="cartCount">0</span> itens · R$<span id="cartTotal">0</span>
  </div>

  <!-- ── ORDER MODAL ── -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-title">
        Seu pedido
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div id="modalItems"></div>
      <div class="order-total">
        <span>Total</span>
        <span style="color:var(--amber)">R$<span id="modalTotal">0</span></span>
      </div>
      <button class="confirm-btn" onclick="confirmOrder()">Confirmar pedido</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
